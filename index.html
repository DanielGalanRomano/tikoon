<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DescuentosApp — Mejores Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  /* Estilos esenciales */
  :root { --bg: #F5F2EC; --surface: #FFF; --text: #1C1B19; --primary: #E8441A; --border: 1px solid rgba(0,0,0,0.06); }
  body { background-color: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding-bottom: 100px; }
  header { background: var(--surface); padding: 20px; border-bottom: var(--border); }
  .view { display: none; padding: 16px; } .view.active { display: block; }
  .grid-ofertas { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .card-prod { background: var(--surface); padding: 12px; border-radius: 12px; border: var(--border); }
  .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #FFF; border-top: var(--border); display: flex; justify-content: space-around; padding: 15px; }
  .nav-tab { cursor: pointer; border: none; background: none; color: #706E64; display: flex; flex-direction: column; align-items: center; }
  .nav-tab.active { color: var(--primary); }
</style>
</head>
<body>

<header><h1>Ahorra<span>.io</span></h1></header>

<main id="view-home" class="view active">
  <div class="grid-ofertas" id="grid-box">Cargando ofertas...</div>
</main>

<main id="view-admin" class="view">
  <div id="admin-list"></div>
</main>

<nav class="nav-bottom">
  <button class="nav-tab active" onclick="switchView('home')" id="tab-home">
    <span>Ofertas</span>
  </button>
  <button class="nav-tab" onclick="switchView('admin')" id="tab-admin">
    <span>Consola</span>
  </button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 1. CONFIGURACIÓN ÚNICA
  const SUPABASE_URL = "https://rujxdrdgegwfbmmpvmid.supabase.co"; 
  const SUPABASE_KEY = "sb_publishable_oOKB7X2ntZhrwIziRquvTA_FsbuAERD"; 
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let productos = [];

  // 2. FUNCIÓN DE NAVEGACIÓN CORREGIDA
  function switchView(viewName) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const targetView = document.getElementById('view-' + viewName);
    const targetTab = document.getElementById('tab-' + viewName);
    if(targetView) targetView.classList.add('active');
    if(targetTab) targetTab.classList.add('active');
  }

  // 3. OBTENER DATOS
  async function fetchAllOfertas() {
    try {
      const { data, error } = await supabase.from('ofertas').select('*');
      if (error) throw error;
      productos = data || [];
      renderUI();
    } catch(e) {
      console.error("Error al cargar:", e);
    }
  }

  // 4. RENDERIZADO
  function renderUI() {
    const box = document.getElementById('grid-box');
    if (!box) return;
    box.innerHTML = productos.map(p => `
      <div class="card-prod">
        <h3>${p.nombre}</h3>
        <p>$${p.precio}</p>
      </div>
    `).join('');
  }

  // INICIO
  fetchAllOfertas();
</script>
</body>
</html>
