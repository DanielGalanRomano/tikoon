<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cebate Uno">
  <meta name="theme-color" content="#0F7B5E">
  <title>Cebate Uno — Encuentros con mate en el parque</title>

  <!-- Google Identity Services SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --verde: #0F7B5E;
      --verde-light: #DEF5EC;
      --crema: #FEF9F0;
      --crema-dark: #E8DDD0;
      --borde: #EFE3D4;
      --texto: #2A241A;
      --subtexto: #6B5A4B;
      --rojo: #DC2626;
      --gris: #6B7280;
      --gris-claro: #E5E7EB;
      --azul: #3B82F6;
      --azul-claro: #EFF6FF;
      --header-bg: #F2F2F7;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--crema-dark);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .app {
      max-width: 480px;
      width: 100%;
      background: var(--crema);
      border-radius: 32px;
      min-height: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .sticky-top {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 100vw);
      z-index: 500;
      background: var(--header-bg);
      border-radius: 32px 32px 0 0;
    }

    @media (max-width: 500px) {
      body { padding: 0; }
      .app { border-radius: 0; max-width: 100%; }
      .sticky-top { width: 100vw; border-radius: 0; }
      .fab { bottom: calc(20px + var(--safe-bottom)); right: 16px; }
    }

    .header {
      padding: calc(14px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .logo-wrap { text-align: center; flex: 1; }
    .logo { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 900; color: var(--verde); }
    .sub { font-size: 10px; color: var(--subtexto); }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .refresh-btn {
      background: white;
      border: 1px solid var(--borde);
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 16px;
    }
    .user-avatar-placeholder {
      width: 34px;
      height: 34px;
      border-radius: 17px;
      background: var(--verde);
      color: white;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .nav-bar { display: none; align-items: center; padding: 10px 16px 12px; gap: 12px; }
    .nav-bar.visible { display: flex; }
    .back-btn {
      background: white;
      border: 1px solid var(--borde);
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 18px;
    }
    .nav-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; color: var(--texto); flex: 1; }

    .content { padding: 16px 20px 20px; overflow-y: auto; flex: 1; }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      border: 1px solid var(--borde);
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }
    .card-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 17px; color: var(--texto); margin-bottom: 8px; }
    .card-info { display: flex; gap: 12px; font-size: 13px; color: var(--subtexto); margin: 6px 0; flex-wrap: wrap; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
    .badge {
      background: var(--verde-light);
      color: var(--verde);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.lleno { background: #FEE2E2; color: var(--rojo); }
    .badge.tuya { background: #FEF3C7; color: #92400E; }
    .organizador-chip {
      font-size: 12px;
      color: var(--subtexto);
      background: var(--crema-dark);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .btn {
      background: var(--verde);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 15px;
      margin-top: 12px;
    }
    .btn-back {
      background: var(--gris-claro);
      color: var(--gris);
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    .fab {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      right: 24px;
      background: var(--verde);
      color: white;
      border: none;
      height: 52px;
      padding: 0 22px;
      border-radius: 26px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(15,123,94,0.45);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 300;
    }

    .form-group { margin-bottom: 16px; }
    .form-input, .form-select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--borde);
      border-radius: 16px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    .form-label { font-size: 13px; font-weight: 600; color: var(--subtexto); margin-bottom: 7px; display: block; }

    .duracion-grid { display: flex; gap: 8px; }
    .duracion-btn {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: 1.5px solid var(--borde);
      background: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .duracion-btn.selected {
      background: var(--verde-light);
      border-color: var(--verde);
      color: var(--verde);
    }
    .option-grid { display: flex; gap: 8px; }
    .option-btn {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: 1.5px solid var(--borde);
      background: white;
      cursor: pointer;
      transition: all 0.15s;
    }
    .option-btn.selected {
      background: var(--verde-light);
      border-color: var(--verde);
      color: var(--verde);
    }

    .tiempo-opciones {
      display: flex;
      gap: 12px;
      margin: 16px 0;
      justify-content: center;
    }
    .opcion-tiempo {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      background: white;
      border: 2px solid var(--borde);
      border-radius: 60px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .opcion-tiempo.selected {
      background: var(--verde);
      border-color: var(--verde);
      color: white;
    }

    .chat-section {
      background: white;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid var(--borde);
      margin-bottom: 12px;
    }
    .chat-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--texto);
      margin-bottom: 16px;
      border-bottom: 2px solid var(--verde-light);
      padding-bottom: 8px;
    }
    .qa-bubble {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 12px;
    }
    .qa-bubble-question {
      background: var(--azul-claro);
      border-left: 4px solid var(--azul);
    }
    .qa-bubble-answer {
      background: var(--verde-light);
      border-left: 4px solid var(--verde);
      margin-left: 20px;
      margin-bottom: 16px;
    }
    .qa-bubble-text { font-size: 14px; color: var(--texto); line-height: 1.5; }
    .qa-meta { font-size: 11px; color: var(--subtexto); margin-top: 6px; display: flex; justify-content: space-between; }
    .chat-input-area {
      background: var(--crema-dark);
      border-radius: 14px;
      padding: 12px;
      margin-top: 12px;
    }
    .chat-input-area textarea {
      width: 100%;
      border: 1.5px solid var(--borde);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      resize: vertical;
    }
    .chat-send-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .chat-waiting {
      background: #FEF3C7;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      color: #92400E;
    }
    .chat-disabled-msg {
      background: var(--crema-dark);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--subtexto);
      text-align: center;
    }
    .char-counter {
      font-size: 11px;
      color: var(--subtexto);
      text-align: right;
      margin-top: 4px;
    }

    .detail-header {
      background: white;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--borde);
    }
    .detail-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 900; color: var(--texto); margin-bottom: 10px; }
    .detail-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--subtexto); margin: 6px 0; flex-wrap: wrap; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--subtexto);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .join-card {
      background: #FFF8EC;
      border: 1px solid #F5D9A8;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .toast {
      position: fixed;
      bottom: calc(90px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: #1C1C1E;
      color: white;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    #headerSpacer { flex-shrink: 0; }
    #homeListContainer { overflow-y: auto; flex: 1; padding-bottom: 80px; }

    .section-label {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--texto);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 8px;
    }
    .loading { opacity: 0.7; pointer-events: none; }
    .spinning { animation: spin 0.6s linear; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="app">
  <div class="sticky-top" id="stickyTop">
    <div class="header" id="mainHeader">
      <div class="logo-wrap">
        <div class="logo">🧉 cebate uno</div>
        <div class="sub">Encuentros con mate en el parque</div>
      </div>
      <div class="header-actions">
        <button class="refresh-btn" onclick="recargar()">↻</button>
        <div id="authArea"></div>
      </div>
    </div>
    <div class="nav-bar" id="navBar">
      <button class="back-btn" onclick="goBack()">←</button>
      <span class="nav-title" id="navTitle"></span>
    </div>
  </div>

  <div id="headerSpacer"></div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div id="homeListContainer">
      <div class="section-label"><span>Mateadas activas</span><span id="contadorMateadas"></span></div>
      <div id="homeContent"></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="screen-detail" class="screen"><div class="content" id="detailContent"></div></div>

  <!-- CREATE -->
  <div id="screen-create" class="screen">
    <div class="content">
      <div class="form-group"><label class="form-label">👤 Tu nombre</label><input class="form-input" id="nombreOrganizador" placeholder="Ej: Juan"></div>
      <div class="form-group"><label class="form-label">🎯 Tema</label>
        <select id="temaMateada" class="form-select">
          <option>🤝 Emprendedurismo</option>
          <option selected>📖 Filosofía y vida cotidiana</option>
          <option>💻 Tecnología e IA</option>
          <option>🎨 Arte y creatividad</option>
          <option>📚 Literatura</option>
          <option>🎬 Cine y series</option>
          <option>🌱 Sustentabilidad</option>
          <option>🧘 Bienestar y meditación</option>
          <option>⚽ Mundial de fútbol</option>
          <option>🤔 Problemas existenciales</option>
          <option>🍷 Vinos y whiskies</option>
          <option>🎒 Viajes de mochilero</option>
          <option>🧠 Salud mental</option>
          <option>🗣️ Necesito descargarme</option>
          <option>🏛️ Política</option>
          <option>🚀 Emprendimientos</option>
          <option>💡 Aconsejar personas</option>
          <option>🔮 Esoterismo</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">📍 Ubicación</label><input class="form-input" id="ubicacionMateada" placeholder="Ej: Parque Las Heras"></div>
      <div class="form-group"><label class="form-label">⏳ Duración</label>
        <div class="duracion-grid">
          <button class="duracion-btn" onclick="seleccionarDuracion(this,30)">30 min</button>
          <button class="duracion-btn selected" onclick="seleccionarDuracion(this,60)">1 hora</button>
          <button class="duracion-btn" onclick="seleccionarDuracion(this,120)">2 horas</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">🧉 ¿Cómo tomás el mate?</label>
        <div class="option-grid">
          <button class="option-btn" onclick="seleccionarMate(this)">Amargo</button>
          <button class="option-btn selected" onclick="seleccionarMate(this)">Dulce</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">👥 Cupo máximo</label>
        <select id="cupoMateada" class="form-select"><option>4</option><option>6</option><option selected>8</option><option>10</option></select>
      </div>
      <button class="btn" onclick="crearMateada()">🌿 Publicar mateada</button>
      <button class="btn-back" onclick="irInicio()">Cancelar</button>
    </div>
  </div>

  <!-- JOIN -->
  <div id="screen-join" class="screen">
    <div class="content">
      <div id="joinInfo"></div>
      <div class="form-group">
        <label class="form-label">📝 Tu pregunta (máx. 500 caracteres)</label>
        <textarea id="preguntaUnirse" rows="3" placeholder="Ej: ¿Hay que llevar algo? ¿Dónde nos encontramos?" maxlength="500" style="width:100%; border:1.5px solid var(--borde); border-radius:12px; padding:10px;"></textarea>
        <div class="char-counter" id="preguntaUnirseCounter">0/500</div>
      </div>
      <div class="form-group">
        <label class="form-label">⏱️ ¿Cuándo llegarías?</label>
        <div class="tiempo-opciones">
          <div class="opcion-tiempo" onclick="seleccionarTiempoLlegada(this,3)">3 min</div>
          <div class="opcion-tiempo" onclick="seleccionarTiempoLlegada(this,20)">20 min</div>
          <div class="opcion-tiempo selected" onclick="seleccionarTiempoLlegada(this,60)">1 hora</div>
        </div>
      </div>
      <button class="btn" onclick="enviarSolicitudYPregunta()">🧉 Enviar todo</button>
      <button class="btn-back" onclick="volverADetalle()">← Volver</button>
    </div>
  </div>

  <!-- SENT -->
  <div id="screen-sent" class="screen">
    <div class="sent-screen" style="text-align:center; padding:60px 20px;">
      <div style="font-size:72px;">🧉✨</div>
      <div style="font-family:'Fraunces',serif; font-size:28px;">¡Listo!</div>
      <p>Le avisamos al organizador<br>tu pregunta y llegada.</p>
      <button class="btn btn-secondary" onclick="irInicio()" style="margin-top:28px;">← Volver</button>
    </div>
  </div>

  <button class="fab" onclick="irACrear()"><span>+</span> Agregar mateada</button>
</div>

<script>
// ============================================
// CONFIGURACIÓN
// ============================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylfR3cTEeaXN14MqzdTzYJH0otTcgDO0zJF-H-glS-hpoNHhZvFvkbIWaLsRBFiBGI/exec';

// ============================================
// DATOS DE EJEMPLO (MIENTRAS TANTO)
// ============================================
const MATEADAS_EJEMPLO = [
  {
    id: "1",
    titulo: "📖 Filosofía y vida cotidiana",
    ubicacion: "Parque Las Heras, CABA",
    latitud: -34.5842,
    longitud: -58.4073,
    lugares_totales: 8,
    lugares_libres: 5,
    organizador: "Daniel",
    organizador_sub: "ejemplo123",
    descripcion: "Mateada de Filosofía · Dulce",
    duracion_minutos: 60,
    hora: "15:30",
    timestamp_ms: Date.now()
  },
  {
    id: "2",
    titulo: "💻 Tecnología e IA",
    ubicacion: "Parque Centenario, CABA",
    latitud: -34.605,
    longitud: -58.435,
    lugares_totales: 6,
    lugares_libres: 3,
    organizador: "Mariana",
    organizador_sub: "ejemplo456",
    descripcion: "Mateada de Tecnología · Amargo",
    duracion_minutos: 90,
    hora: "17:00",
    timestamp_ms: Date.now()
  },
  {
    id: "3",
    titulo: "🎨 Arte y creatividad",
    ubicacion: "Plaza Francia, Recoleta",
    latitud: -34.582,
    longitud: -58.392,
    lugares_totales: 10,
    lugares_libres: 7,
    organizador: "Carlos",
    organizador_sub: "ejemplo789",
    descripcion: "Mateada de Arte · Dulce",
    duracion_minutos: 120,
    hora: "16:00",
    timestamp_ms: Date.now()
  }
];

// ============================================
// AUTENTICACIÓN GOOGLE
// ============================================
let usuarioActual = null;
let tiempoLlegadaSeleccionado = 60;
let chatCache = {};
let usandoDatosReales = false;

const sesionGuardada = localStorage.getItem('usuario_cebate_google');
if (sesionGuardada) {
    try { usuarioActual = JSON.parse(sesionGuardada); } catch(e) {}
}

function handleCredentialResponse(response) {
    const data = JSON.parse(atob(response.credential.split('.')[1]));
    usuarioActual = {
        sub: data.sub,
        nombre: data.name,
        email: data.email,
        avatar: data.picture
    };
    localStorage.setItem('usuario_cebate_google', JSON.stringify(usuarioActual));
    actualizarInterfazUsuario();
    mostrarToast(`✅ ¡Bienvenido/a, ${usuarioActual.nombre}!`);
    cargarMateadas();
}

function cerrarSesion() {
    usuarioActual = null;
    localStorage.removeItem('usuario_cebate_google');
    actualizarInterfazUsuario();
    mostrarToast('👋 Sesión cerrada');
    cargarMateadas();
}

function actualizarInterfazUsuario() {
    const area = document.getElementById('authArea');
    if (!area) return;
    if (!usuarioActual) {
        area.innerHTML = `<div id="googleButtonContainer"></div>`;
        if (window.google && google.accounts) {
            google.accounts.id.renderButton(
                document.getElementById("googleButtonContainer"),
                { theme: "outline", size: "small", text: "signin_with", shape: "pill" }
            );
        }
    } else {
        area.innerHTML = `<div class="user-avatar-placeholder" onclick="abrirUserSheet()">${usuarioActual.nombre[0].toUpperCase()}</div>`;
    }
}

function abrirUserSheet() {
    if (!usuarioActual) return;
    if (confirm(`Usuario: ${usuarioActual.nombre}\nEmail: ${usuarioActual.email}\n\n¿Cerrar sesión?`)) cerrarSesion();
}

// ============================================
// ESTADO GLOBAL
// ============================================
let mateadasActuales = [];
let mateadaSeleccionada = null;
let duracionSeleccionada = 60;

// ============================================
// FUNCIONES PRINCIPALES
// ============================================
function duracionTexto(mins) {
    if (mins == 30) return '30 min';
    if (mins == 60) return '1 hora';
    if (mins == 120) return '2 horas';
    return mins + ' min';
}

function getInicioMs(m) {
    if (m.timestamp_ms) return parseInt(m.timestamp_ms);
    if (m.timestamp_unix) return parseInt(m.timestamp_unix) * 1000;
    if (m.hora) {
        const [h, min] = m.hora.split(':').map(Number);
        if (!isNaN(h) && !isNaN(min)) {
            const n = new Date();
            return new Date(n.getFullYear(), n.getMonth(), n.getDate(), h, min, 0).getTime();
        }
    }
    return Date.now();
}

function estaTerminada(m) {
    const inicio = getInicioMs(m);
    const duracionMs = (parseInt(m.duracion_minutos) || 60) * 60000;
    return Date.now() > (inicio + duracionMs);
}

function getMsRestante(m) {
    const inicio = getInicioMs(m);
    const duracionMs = (parseInt(m.duracion_minutos) || 60) * 60000;
    return (inicio + duracionMs) - Date.now();
}

function formatTiempoRestante(ms) {
    if (ms <= 0) return 'Terminada';
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}h ${m.toString().padStart(2, '0')}m`;
    if (m > 0) return `${m}m ${sec.toString().padStart(2, '0')}s`;
    return `${sec}s`;
}

function iniciarCountdown(m, fillId, labelId) {
    const durMs = (parseInt(m.duracion_minutos) || 60) * 60000;
    function tick() {
        const fill = document.getElementById(fillId);
        const label = document.getElementById(labelId);
        if (!fill || !label) return;
        const ms = getMsRestante(m);
        if (ms === null || isNaN(ms)) {
            fill.style.width = '100%';
            fill.style.background = '#0F7B5E';
            label.textContent = duracionTexto(parseInt(m.duracion_minutos) || 60);
            return;
        }
        const pct = Math.max(0, Math.min(1, ms / durMs));
        const color = pct > 0.5 ? '#0F7B5E' : (pct > 0.25 ? '#D97706' : '#DC2626');
        fill.style.width = (pct * 100) + '%';
        fill.style.background = color;
        if (ms <= 0) {
            fill.style.width = '0%';
            label.textContent = 'Terminada ✓';
            label.style.color = '#DC2626';
        } else {
            label.textContent = formatTiempoRestante(ms);
            label.style.color = color;
        }
    }
    tick();
    const interval = setInterval(tick, 1000);
    return interval;
}

async function cargarMateadas() {
    const container = document.getElementById('homeContent');
    container.innerHTML = '<div class="empty"><div class="empty-icon">🧉</div>Cargando mateadas...</div>';
    
    try {
        // Intentar cargar desde el servidor
        const response = await fetch(`${SCRIPT_URL}?accion=obtenerMateadas`);
        const data = await response.json();
        
        if (data.success && data.mateadas && data.mateadas.length > 0) {
            mateadasActuales = data.mateadas.filter(m => !estaTerminada(m));
            usandoDatosReales = true;
        } else {
            // Usar datos de ejemplo
            mateadasActuales = MATEADAS_EJEMPLO.filter(m => !estaTerminada(m));
            usandoDatosReales = false;
        }
    } catch(e) {
        console.log('Error al cargar desde servidor, usando datos de ejemplo:', e);
        mateadasActuales = MATEADAS_EJEMPLO.filter(m => !estaTerminada(m));
        usandoDatosReales = false;
    }
    
    const contadorSpan = document.getElementById('contadorMateadas');
    if (contadorSpan) {
        contadorSpan.textContent = mateadasActuales.length ? `${mateadasActuales.length} activa${mateadasActuales.length !== 1 ? 's' : ''}` : '';
    }
    
    if (mateadasActuales.length === 0) {
        if (usuarioActual) {
            container.innerHTML = '<div class="empty"><div class="empty-icon">✨</div>No hay mateadas activas<br>¡Sé el primero en crear una!</div>';
        } else {

                    <p>Iniciá sesión con Google para crear o unirte a mateadas</p>
                    <div id="googleButtonCenter" style="margin-top:16px;"></div>
                </div>
            `;
            if (window.google && google.accounts && !usuarioActual) {

            }

    }
    
    container.innerHTML = '';
    mateadasActuales.forEach((m, i) => {

        const durMins = parseInt(m.duracion_minutos) || 60;

        const labelId = `label-${m.id}`;
        const esMia = usuarioActual && (usuarioActual.sub === m.organizador_sub || usuarioActual.nombre === m.organizador);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${m.id}`;
        card.onclick = () => verDetalle(m);
        card.innerHTML = `
            <div class="card-title">${escapeHtml(m.titulo)}</div>
            <div class="card-info"><span>📍 ${escapeHtml(m.ubicacion)}</span><span>⏰ ${m.hora || 'Ahora'}</span></div>
            <div class="card-footer">
                <span class="badge ${libres === 0 ? 'lleno' : (esMia ? 'tuya' : '')}">
                    ${libres === 0 ? '🔴 Sin lugares' : (esMia ? '🌟 Tu mateada' : `🎟️ ${libres} lugar${libres !== 1 ? 'es' : ''} libre`)}
                </span>
                <span class="organizador-chip">🧑 ${escapeHtml(m.organizador)}</span>
            </div>
            <div class="countdown-wrap" style="margin-top:10px;">
                <div class="countdown-label" style="display:flex; justify-content:space-between; font-size:11px;">
                    <span>⏳ ${duracionTexto(durMins)}</span>
                    <span id="${labelId}">—</span>
                </div>
                <div class="countdown-bar-track" style="height:6px; background:var(--crema-dark); border-radius:3px; overflow:hidden;">
                    <div class="countdown-bar-fill" id="${fillId}" style="height:100%; width:0%; border-radius:3px;"></div>
                </div>
            </div>
        `;
        container.appendChild(card);
        const interval = iniciarCountdown(m, fillId, labelId);
        if (window.countdownIntervals) window.countdownIntervals[m.id] = interval;
        else { window.countdownIntervals = {}; window.countdownIntervals[m.id] = interval; }
    });
}

async function crearMateada() {
    if (!usuarioActual) {
        mostrarToast('Primero iniciá sesión con Google');
        return;

    const organizador = document.getElementById('nombreOrganizador').value.trim();
    const titulo = document.getElementById('temaMateada').value;

    const hora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    
    if (!organizador) { mostrarToast('Ingresá tu nombre'); return; }
    if (!ubicacion) { mostrarToast('Ingresá la ubicación'); return; }
    
    const btn = event.target;
    btn.classList.add('loading');
    btn.innerText = 'Publicando...';
    
    try {
        const nuevaMateada = {
            id: Date.now().toString(),
            titulo: titulo,
            ubicacion: ubicacion,
            latitud: -34.5842,
            longitud: -58.4073,
            lugares_totales: cupo,
            lugares_libres: cupo,
            organizador: organizador,
            organizador_sub: usuarioActual.sub,

            duracion_minutos: duracionSeleccionada,
            hora: hora,
            timestamp_ms: Date.now()
        };
        
        // Intentar guardar en el servidor
        try {
            const params = new URLSearchParams({
                accion: 'crearMateada',
                titulo: titulo,
                ubicacion: ubicacion,
                latitud: -34.5842,
                longitud: -58.4073,
                lugares_totales: cupo,
                organizador: organizador,
                organizador_sub: usuarioActual.sub,
                organizador_email: usuarioActual.email,
                descripcion: `Mateada de ${titulo} · ${tipoMate}`,
                duracion_minutos: duracionSeleccionada,

            });

async function enviarSolicitudYPregunta() {

    }
    
    const minutos = tiempoLlegadaSeleccionado;

                accion: 'enviarPregunta',

                usuario_nombre: usuarioActual.nombre,

    } finally {

async function obtenerChat(mateadaId) {
    if (chatCache[mateadaId]) return chatCache[mateadaId];
    try {
        const response = await fetch(`${SCRIPT_URL}?accion=obtenerChat&mateada_id=${encodeURIComponent(mateadaId)}`);
        const data = await response.json();
        chatCache[mateadaId] = data.success ? (data.chats || []) : [];
        return chatCache[mateadaId];
    } catch(e) {
        return [];
    }
}

async function enviarRespuesta(chatId, respuesta) {
    if (!usuarioActual) return { success: false };
    if (respuesta.length > 500) {
        mostrarToast('La respuesta no puede superar los 500 caracteres');
        return { success: false };
    }
    
    try {
        const params = new URLSearchParams({
            accion: 'responderPregunta',
            chat_id: chatId,
            respuesta: respuesta,
            organizador_sub: usuarioActual.sub
        });
        await fetch(`${SCRIPT_URL}?${params}`);
        mostrarToast('✅ Respuesta enviada');
        delete chatCache[mateadaSeleccionada.id];
        return { success: true };
    } catch(e) {
        mostrarToast('Error de conexión');
        return { success: false };
    }
}

function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function formatFecha(iso) {
    if (!iso) return '';
    try {
        const d = new Date(iso);
        return d.toLocaleString('es-AR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch(e) { return iso; }
}

async function renderChat(mateada, container) {
    const esOrganizador = usuarioActual && (usuarioActual.sub === mateada.organizador_sub || usuarioActual.nombre === mateada.organizador);
    const chats = await obtenerChat(mateada.id);
    
    let html = '<div class="chat-section">';
    html += '<div class="chat-title">💬 Preguntas y respuestas</div>';
    
    if (!usuarioActual) {
        html += '<div class="chat-disabled-msg">🔐 Iniciá sesión para ver las preguntas</div>';
    } else if (chats.length === 0) {
        html += '<div class="chat-disabled-msg">📭 Aún no hay preguntas</div>';
    } else {
        chats.forEach(chat => {
            const esMiPregunta = usuarioActual && chat.usuario_sub === usuarioActual.sub;
            
            html += `
                <div class="qa-bubble qa-bubble-question">
                    <div class="qa-bubble-text">
                        <strong>❓ ${escapeHtml(chat.usuario_nombre)}:</strong><br>
                        ${escapeHtml(chat.pregunta)}
                    </div>
                    <div class="qa-meta">📅 ${formatFecha(chat.fecha)}</div>
                </div>
            `;
            
            if (chat.respuesta) {
                html += `
                    <div class="qa-bubble qa-bubble-answer">
                        <div class="qa-bubble-text">
                            <strong>✅ ${escapeHtml(mateada.organizador)}:</strong><br>
                            ${escapeHtml(chat.respuesta)}
                        </div>
                        <div class="qa-meta">📅 ${formatFecha(chat.fecha_respuesta)}</div>
                    </div>
                `;
            } else if (esOrganizador && !esMiPregunta) {
                html += `
                    <div class="chat-input-area">
                        <textarea id="respuesta-${chat.id}" rows="2" placeholder="Responder a ${escapeHtml(chat.usuario_nombre)}..." maxlength="500"></textarea>
                        <div class="char-counter" id="resp-counter-${chat.id}">0/500</div>
                        <button class="chat-send-btn" onclick="enviarRespuestaHandler('${chat.id}')">✏️ Responder</button>
                    </div>
                `;
            } else if (!esOrganizador && esMiPregunta && !chat.respuesta) {
                html += `<div class="chat-waiting">⏳ Esperando respuesta del organizador...</div>`;
            }
        });
    }
    
    html += '</div>';
    container.innerHTML = html;
    
    setTimeout(() => {
        chats.forEach(chat => {
            const ta = document.getElementById(`respuesta-${chat.id}`);
            if (ta) {
                ta.addEventListener('input', function() {
                    const c = document.getElementById(`resp-counter-${chat.id}`);
                    if (c) c.textContent = `${this.value.length}/500`;
                });
            }
        });
    }, 100);
}

async function enviarRespuestaHandler(chatId) {
    const ta = document.getElementById(`respuesta-${chatId}`);
    if (!ta) return;
    const respuesta = ta.value.trim();
    if (!respuesta) { mostrarToast('Escribí una respuesta'); return; }
    if (respuesta.length > 500) { mostrarToast('Máximo 500 caracteres'); return; }
    
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    
    const result = await enviarRespuesta(chatId, respuesta);
    if (result.success) {
        ta.value = '';
        await verDetalle(mateadaSeleccionada);
    }
    
    btn.disabled = false;
    btn.textContent = '✏️ Responder';
}
