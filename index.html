<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E8441A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DescuentosApp">
<title>DescuentosApp — Mejores Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ══ RESET & TOKENS ══ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #F5F2EC;
  --surface: #FFF;
  --s2: #F0EDE6;
  --s3: #E6E2D8;
  --text: #1C1B19;
  --text-m: #706E64;
  --primary: #E8441A;
  --primary-rgb: 232,68,26;
  --accent: #138052;
  --radius: 20px;
  --radius-sm: 12px;
  --font-title: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --shadow: 0 4px 20px rgba(0,0,0,0.03);
  --border: 1px solid rgba(0,0,0,0.06);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  padding-bottom: 90px;
}

h1, h2, h3, h4 { font-family: var(--font-title); font-weight: 700; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; border: none; background: none; cursor: pointer; }
input, select, textarea { font-family: inherit; border: none; outline: none; }

/* ── App Header ── */
header {
  background: var(--surface);
  padding: 20px 166px;
  border-bottom: var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
@media (max-width: 768px) {
  header { padding: 20px 16px; }
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.logo-area h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.logo-area span { color: var(--primary); }

.search-wrapper {
  background: var(--s2);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-wrapper input {
  background: transparent;
  width: 100%;
  font-size: 15px;
  color: var(--text);
}

.cats-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 16px 16px;
  scrollbar-width: none;
}
.cats-scroll::-webkit-scrollbar { display: none; }
.cat-pill {
  background: var(--surface);
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  border: var(--border);
  transition: all 0.2s ease;
}
.cat-pill.active {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
}

/* ── Vistas ── */
.view { display: none; padding: 16px; max-width: 1200px; margin: 0 auto; }
.view.active { display: block; }

.grid-ofertas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.card-prod {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px;
  border: var(--border);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  position: relative;
  cursor: pointer;
}
.card-img-box {
  width: 100%;
  aspect-ratio: 1;
  background: var(--s2);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 10px;
}
.card-img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.badge-discount {
  position: absolute;
  top: 20px;
  left: 20px;
  background: var(--primary);
  color: var(--surface);
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-title);
}
.card-brand { font-size: 11px; text-transform: uppercase; color: var(--text-m); font-weight: 600; margin-bottom: 2px; }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 36px; }

.price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.curr-price { font-size: 18px; font-weight: 700; font-family: var(--font-title); color: var(--text); }
.old-price { font-size: 12px; text-decoration: line-through; color: var(--text-m); }

.store-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--s2);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  margin-top: auto;
}

/* ── Detalle / Comparador ── */
.detail-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  border: var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.detail-header { display: flex; gap: 16px; margin-bottom: 20px; }
.detail-img { width: 90px; height: 90px; background: var(--s2); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.detail-img img { width: 100%; height: 100%; object-fit: cover; }
.detail-main-info { flex: 1; }

.comp-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  background: var(--s2);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  border: 1px solid transparent;
}
.comp-item.best {
  background: #E8F5E9;
  border-color: var(--accent);
}
.comp-store { font-weight: 600; font-size: 14px; }
.comp-price-box { text-align: right; }
.comp-p { font-family: var(--font-title); font-weight: 700; font-size: 16px; }
.comp-shipping { font-size: 11px; color: var(--accent); font-weight: 500; }

.btn-go {
  background: var(--text);
  color: var(--surface);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 10px;
}
.best .btn-go { background: var(--accent); }

/* ── Panel Admin Mínimo ── */
.form-box {
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius);
  border: var(--border);
  margin-bottom: 16px;
}
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-m); margin-bottom: 4px; }
.form-control {
  width: 100%;
  background: var(--s2);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text);
}
.btn-submit {
  width: 100%;
  background: var(--primary);
  color: var(--surface);
  padding: 12px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-family: var(--font-title);
  margin-top: 8px;
}
.adm-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  padding: 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  border: var(--border);
}

/* ── Barra Navegación Inferior Estilo iOS ── */
nav.nav-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: var(--border);
  display: flex;
  justify-content: space-around;
  padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px));
  z-index: 200;
}
.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-m);
  font-size: 11px;
  font-weight: 500;
  width: 60px;
}
.nav-tab.active { color: var(--primary); font-weight: 600; }
.nav-tab svg { width: 22px; height: 22px; fill: currentColor; }

/* ── Toast & Realtime Indicator ── */
#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1C1B19;
  color: #FFF;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
#toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

.realtime-bar {
  background: #138052;
  color: white;
  font-size: 11px;
  text-align: center;
  padding: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.pulse-dot {
  width: 6px;
  height: 6px;
  background: #FFF;
  border-radius: 50%;
  animation: pulse 1.6s infinite;
}
@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0.5; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(0.8); opacity: 0.5; }
}
</style>
</head>
<body>

<div class="realtime-bar"><div class="pulse-dot"></div> SUPABASE REALTIME CONECTADO</div>

<header id="main-header">
  <div class="header-top">
    <div class="logo-area">
      <h1>Ahorra<span>.io</span></h1>
    </div>
  </div>
  <div class="search-wrapper">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input type="text" id="search-input" placeholder="Buscar iPhones, zapatillas, indumentaria...">
  </div>
</header>

<div class="cats-scroll" id="cats-box"></div>

<main id="view-home" class="view active">
  <div class="grid-ofertas" id="grid-box"></div>
</main>

<main id="view-detail" class="view">
  <div class="detail-card" id="detail-card-box"></div>
  <h3 style="margin: 20px 0 12px; font-size: 16px;">Tiendas que lo venden:</h3>
  <div id="comparativa-box"></div>
</main>

<main id="view-admin" class="view">
  <div class="form-box">
    <h2 style="font-size: 18px; margin-bottom: 14px;" id="form-title">Agregar Nueva Oferta</h2>
    <form id="prod-form" onsubmit="saveProduct(event)">
      <div class="form-group">
        <label>ID Único de Producto (ej: iphone15)</label>
        <input type="text" id="f-id" class="form-control" required placeholder="Usar el mismo id para agrupar tiendas">
      </div>
      <div class="form-group">
        <label>Nombre Comercial</label>
        <input type="text" id="f-name" class="form-control" required placeholder="Ej: Apple iPhone 15 128GB">
      </div>
      <div class="form-group">
        <label>Marca</label>
        <input type="text" id="f-brand" class="form-control" placeholder="Ej: Apple">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="f-cat" class="form-control">
          <option value="tech">Tecnología (tech)</option>
          <option value="moda">Indumentaria y Calzado (moda)</option>
          <option value="hogar">Hogar y Bazar (hogar)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tienda Retailer</label>
        <input type="text" id="f-store" class="form-control" required placeholder="Ej: Mercado Libre, Fravega">
      </div>
      <div class="form-group">
        <label>Precio Actual ($)</label>
        <input type="number" id="f-price" class="form-control" required placeholder="469999">
      </div>
      <div class="form-group">
        <label>Precio Anterior (Opcional)</label>
        <input type="number" id="f-oldprice" class="form-control" placeholder="529999">
      </div>
      <div class="form-group">
        <label>Cuotas Máximas Sin Interés</label>
        <input type="number" id="f-installments" class="form-control" value="1">
      </div>
      <div class="form-group">
        <label>Envío</label>
        <select id="f-shipping" class="form-control">
          <option value="true">Envío Gratis</option>
          <option value="false">A Cargo del Comprador</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL de Compra</label>
        <input type="url" id="f-url" class="form-control" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>URL Imagen del Producto</label>
        <input type="url" id="f-img" class="form-control" placeholder="https://images.unsplash.com/...">
      </div>
      <div class="form-group">
        <label>Descripción corta</label>
        <textarea id="f-desc" class="form-control" rows="2"></textarea>
      </div>
      <button type="submit" class="btn-submit">Publicar en Base de Datos</button>
    </form>
  </div>

  <h3 style="margin: 20px 0 10px; font-size: 16px;">Ofertas Activas en Supabase</h3>
  <div id="admin-list"></div>
</main>

<nav class="nav-bottom">
  <button class="nav-tab active" onclick="switchView('home')" id="tab-home">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Ofertas</span>
  </button>
  <button class="nav-tab" onclick="switchView('admin')" id="tab-admin">
    <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38-2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
    <span>Consola</span>
  </button>
</nav>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ════ CONFIGURACIÓN DE LAS CREDENCIALES DE TU BASE DE DATOS ════ */
const SUPABASE_URL = "https://rujxdrdgegwfbmmpvmid.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_oOKB7X2ntZhrwIziRquvTA_FsbuAERD"; 

// Inicialización limpia del cliente (CORREGIDO: Declarado una sola vez)
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ════ ESTADO GLOBAL DE LA APP ════ */
const S = {
  products: [],
  categories: ['todos', 'tech', 'moda', 'hogar'],
  _activeCat: 'todos',
  _search: '',
  editingId: null 
};

let cur = 'home';

// Inicialización de Eventos y Carga Inicial
document.addEventListener("DOMContentLoaded", () => {
  initRealtimeFetch();
  renderCategories();
  
  document.getElementById('search-input').addEventListener('input', (e) => {
    S._search = e.target.value.toLowerCase();
    renderHomeGrid(S._search);
  });
});

/* ── Motores de Datos ── */
async function initRealtimeFetch() {
  await fetchAllOfertas();

  supabase
    .channel('cambios-en-ofertas')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ofertas' }, async (payload) => {
       showToast("Base de datos actualizada ⚡");
       await fetchAllOfertas();
    })
    .subscribe();
}

async function fetchAllOfertas() {
  try {
    const { data, error } = await supabase
      .from('ofertas')
      .select('id, producto_id, nombre, marca, categoria, tienda, precio, "precio anterior", envio, cuotas, "url compra", imagen, descripcion');

    if (error) throw error;
    if (data) actualizarCatalogoSupabase(data);
  } catch (err) {
    console.error("Error obteniendo datos de Supabase:", err.message);
  }
}

function actualizarCatalogoSupabase(data) {
  S.products = data.map(item => {
    const pActual = Number(item.precio || 0);
    const pAnterior = item["precio anterior"] ? Number(item["precio anterior"]) : null;
    
    let descCalc = 0;
    if (pAnterior && pAnterior > pActual) {
      descCalc = Math.round(((pAnterior - pActual) / pAnterior) * 100);
    }

    return {
      id: item.producto_id || item.id,
      name: item.nombre,
      brand: item.marca || 'Genérico',
      category: item.categoria || 'todos',
      store: item.tienda,
      price: pActual,
      oldPrice: pAnterior,
      discount: descCalc,
      shipping: item.envio === true ? 0 : null, 
      installments: parseInt(item.cuotas || 1),
      url: item["url compra"] || '#',
      emoji: item.imagen || 'https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=500',
      desc: item.descripcion || '',
      db_id: item.id
    };
  });

  renderHomeGrid(S._search);
  renderAdminProdList();
}

/* ── Renderizado ── */
function renderCategories() {
  const box = document.getElementById('cats-box');
  if (!box) return;
  box.innerHTML = S.categories.map(c => `
    <button class="cat-pill ${S._activeCat === c ? 'active' : ''}" onclick="filterCat('${c}')">
      ${c.toUpperCase()}
    </button>
  `).join('');
}

function filterCat(cat) {
  S._activeCat = cat;
  renderCategories();
  renderHomeGrid(S._search);
}

function getGroupedProducts() {
  const map = {};
  S.products.forEach(p => {
    if (S._activeCat !== 'todos' && p.category !== S._activeCat) return;

    if (!map[p.id]) {
      map[p.id] = { ...p, allStores: [p] };
    } else {
      map[p.id].allStores.push(p);
      if (p.price < map[p.id].price) {
        map[p.id].price = p.price;
        map[p.id].oldPrice = p.oldPrice;
        map[p.id].discount = p.discount;
        map[p.id].store = p.store;
        map[p.id].shipping = p.shipping;
      }
    }
  });
  return Object.values(map);
}

function renderHomeGrid(query = '') {
  const box = document.getElementById('grid-box');
  if (!box) return;
  let items = getGroupedProducts();

  if (query) {
    items = items.filter(p => 
      p.name.toLowerCase().includes(query) || 
      p.brand.toLowerCase().includes(query) ||
      String(p.id).toLowerCase().includes(query)
    );
  }

  if (items.length === 0) {
    box.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-m);">No se encontraron ofertas activas en Supabase.</div>`;
    return;
  }

  box.innerHTML = items.map(p => {
    const totalTiendas = p.allStores ? p.allStores.length : 1;
    return `
      <div class="card-prod" onclick="seeDetail('${p.id}')">
        ${p.discount ? `<div class="badge-discount">-${p.discount}%</div>` : ''}
        <div class="card-img-box">
          <img src="${p.emoji}" alt="${p.name}">
        </div>
        <div class="card-brand">${p.brand}</div>
        <div class="card-title">${p.name}</div>
        
        <div class="price-row">
          <span class="curr-price">${fmt(p.price)}</span>
          ${p.oldPrice ? `<span class="old-price">${fmt(p.oldPrice)}</span>` : ''}
        </div>
        
        <div class="store-badge">
          <span>📍 ${p.store}</span>
        </div>
        <div style="font-size: 11px; margin-top: 4px; color: var(--text-m)">
          ${totalTiendas > 1 ? `🔥 Ver ${totalTiendas} opciones desde` : 'Única opción disponible'}
        </div>
      </div>
    `;
  }).join('');
}

function seeDetail(productId) {
  const variants = S.products.filter(p => p.id === productId);
  if (!variants.length) return;

  variants.sort((a,b) => a.price - b.price);
  const base = variants[0];

  switchView('detail');
  
  document.getElementById('detail-card-box').innerHTML = `
    <div class="detail-header">
      <div class="detail-img">
        <img src="${base.emoji}" alt="${base.name}">
      </div>
      <div class="detail-main-info">
        <div class="card-brand">${base.brand}</div>
        <h2 style="font-size: 18px; line-height:1.2; margin-bottom:6px;">${base.name}</h2>
        <p style="font-size: 13px; color: var(--text-m);">${base.desc}</p>
      </div>
    </div>
  `;

  document.getElementById('comparativa-box').innerHTML = variants.map((v, index) => `
    <div class="comp-item ${index === 0 ? 'best' : ''}">
      <div>
        <div class="comp-store">${v.store} ${index === 0 ? '🏆 Mejor Precio' : ''}</div>
        <div style="font-size:12px; color:var(--text-m)">${v.installments} cuotas de ${fmt(v.price / v.installments)}</div>
      </div>
      <div class="comp-price-box">
        <div class="comp-p">${fmt(v.price)}</div>
        <div class="comp-shipping">${v.shipping === 0 ? '✓ Envío Gratis' : '⚡ Entrega coordinada'}</div>
      </div>
      <a href="${v.url}" target="_blank" class="btn-go">Ir</a>
    </div>
  `).join('');
}

/* ── CRUD Operaciones ── */
async function saveProduct(e) {
  e.preventDefault();

  const idProd = document.getElementById('f-id').value.trim();
  const nombre = document.getElementById('f-name').value.trim();
  const marca = document.getElementById('f-brand').value.trim();
  const categoria = document.getElementById('f-cat').value;
  const tienda = document.getElementById('f-store').value.trim();
  const precio = parseFloat(document.getElementById('f-price').value);
  const precio_anterior = parseFloat(document.getElementById('f-oldprice').value) || null;
  const cuotas = parseInt(document.getElementById('f-installments').value) || 1;
  const envio = document.getElementById('f-shipping').value === "true";
  const url_compra = document.getElementById('f-url').value.trim();
  const imagen = document.getElementById('f-img').value.trim() || undefined;
  const descripcion = document.getElementById('f-desc').value.trim();

  const payload = {
    producto_id: idProd,
    nombre,
    marca,
    categoria,
    tienda,
    precio,
    "precio anterior": precio_anterior, 
    envio,
    cuotas,
    "url compra": url_compra,           
    imagen,
    descripcion
  };

  try {
    let responseError;

    if (S.editingId) {
      const { error } = await supabase
        .from('ofertas')
        .update(payload)
        .eq('id', S.editingId);
      responseError = error;
    } else {
      const { error } = await supabase
        .from('ofertas')
        .insert([payload]);
      responseError = error;
    }

    if (responseError) throw responseError;

    showToast(S.editingId ? "Oferta modificada con éxito" : "Nueva oferta agregada");
    cancelEdit();
    await fetchAllOfertas();
  } catch (err) {
    alert("Error de base de datos: " + err.message);
  }
}

async function deleteOffer(dbId) {
  if (!confirm("¿Eliminar esta oferta permanentemente de Supabase?")) return;
  try {
    const { error } = await supabase
      .from('ofertas')
      .delete()
      .eq('id', dbId);

    if (error) throw error;
    showToast("Oferta eliminada");
    await fetchAllOfertas();
  } catch (err) {
    alert("Error eliminando: " + err.message);
  }
}

function startEdit(dbId) {
  const item = S.products.find(p => p.db_id === dbId);
  if (!item) return;

  S.editingId = dbId;
  document.getElementById('form-title').textContent = "Modificar Oferta #" + dbId;
  
  document.getElementById('f-id').value = item.id;
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-brand').value = item.brand;
  document.getElementById('f-cat').value = item.category;
  document.getElementById('f-store').value = item.store;
  document.getElementById('f-price').value = item.price;
  document.getElementById('f-oldprice').value = item.oldPrice || '';
  document.getElementById('f-installments').value = item.installments;
  document.getElementById('f-shipping').value = item.shipping === 0 ? "true" : "false";
  document.getElementById('f-url').value = item.url;
  document.getElementById('f-img').value = item.emoji;
  document.getElementById('f-desc').value = item.desc;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  S.editingId = null;
  document.getElementById('form-title').textContent = "Agregar Nueva Oferta";
  document.getElementById('prod-form').reset();
}

function renderAdminProdList() {
  const box = document.getElementById('admin-list');
  if (!box) return;
  box.innerHTML = S.products.map(p => `
    <div class="adm-item">
      <div>
        <strong style="font-size:14px;">${p.name}</strong>
        <div style="font-size:12px; color:var(--text-m);">${p.store} — <strong>${fmt(p.price)}</strong></div>
      </div>
      <div style="display:flex; gap:6px;">
        <button onclick="startEdit(${p.db_id})" style="background:var(--s3); padding:6px 10px; border-radius:6px; font-size:12px;">Editar</button>
        <button onclick="deleteOffer(${p.db_id})" style="background:#FFEBEE; color:#C62828; padding:6px 10px; border-radius:6px; font-size:12px;">Borrar</button>
      </div>
    </div>
  `).join('');
}

/* ── Enrutamiento SPA ── */
function switchView(viewName) {
  cur = viewName;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  
  const header = document.getElementById('main-header');
  const cats = document.getElementById('cats-box');

  if (viewName === 'home') {
    document.getElementById('view-home').classList.add('active');
    document.getElementById('tab-home').classList.add('active');
    if (header) header.style.display = 'block';
    if (cats) cats.style.display = 'flex';
  } else if (viewName === 'detail') {
    document.getElementById('view-detail').classList.add('active');
    if (header) header.style.display = 'block';
    if (cats) cats.style.display = 'none';
  } else if (viewName === 'admin') {
    document.getElementById('view-admin').classList.add('active');
    document.getElementById('tab-admin').classList.add('active');
    if (header) header.style.display = 'none';
    if (cats) cats.style.display = 'none';
  }
}

function goBack() {
  switchView('home');
}

function fmt(n) {
  if (n === undefined || n === null) return '—';
  return '$' + Math.round(n).toLocaleString('es-AR');
}

let _toast;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toast);
  _toast = setTimeout(() => t.classList.remove('show'), 2800);
}

/* Control nativo de navegación */
history.pushState(null, '', window.location.href);
window.addEventListener('popstate', () => {
  if (cur !== 'home') {
    goBack();
    history.pushState(null, '', window.location.href);
  }
});
</script>
