<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cebate Uno">
  <meta name="theme-color" content="#0F7B5E">
  <title>Cebate Uno — Encuentros con mate en el parque</title>

  <!-- Google Identity Services SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-152.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --verde: #0F7B5E;
      --verde-light: #DEF5EC;
      --crema: #FEF9F0;
      --crema-dark: #E8DDD0;
      --borde: #EFE3D4;
      --texto: #2A241A;
      --subtexto: #6B5A4B;
      --rojo: #DC2626;
      --gris: #6B7280;
      --gris-claro: #E5E7EB;
      --azul: #3B82F6;
      --azul-claro: #EFF6FF;
      --header-bg: #F2F2F7;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--crema-dark);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }

    .app {
      max-width: 480px;
      width: 100%;
      background: var(--crema);
      border-radius: 32px;
      min-height: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .sticky-top {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 100vw);
      z-index: 500;
      background: var(--header-bg);
      border-radius: 32px 32px 0 0;
    }

    @media (max-width: 500px) {
      body { padding: 0; }
      .app { border-radius: 0; max-width: 100%; }
      .sticky-top { width: 100vw; border-radius: 0; }
      .fab { bottom: calc(20px + var(--safe-bottom)); right: 16px; }
    }

    .header {
      padding: calc(14px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .logo-wrap { text-align: center; flex: 1; }
    .logo { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 900; color: var(--verde); }
    .sub { font-size: 10px; color: var(--subtexto); }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .refresh-btn {
      background: white;
      border: 1px solid var(--borde);
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 16px;
    }
    .user-avatar-placeholder {
      width: 34px;
      height: 34px;
      border-radius: 17px;
      background: var(--verde);
      color: white;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .nav-bar { display: none; align-items: center; padding: 10px 16px 12px; gap: 12px; }
    .nav-bar.visible { display: flex; }
    .back-btn {
      background: white;
      border: 1px solid var(--borde);
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 18px;
    }
    .nav-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px; color: var(--texto); flex: 1; }

    .content { padding: 16px 20px 20px; overflow-y: auto; flex: 1; }
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* Mapa */
    .home-map-section {
      position: relative;
      height: 30dvh;
      min-height: 200px;
      background: var(--crema-dark);
      overflow: hidden;
      flex-shrink: 0;
    }
    #nearbyMap { width: 100%; height: 100%; }
    .nearby-pill {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,123,94,0.92);
      backdrop-filter: blur(8px);
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      max-width: calc(100% - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 10;
    }
    .gps-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 17px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 10;
    }
    .map-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--subtexto);
      gap: 8px;
    }

    /* Cards */
    .card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      border: 1px solid var(--borde);
      transition: transform 0.15s;
    }
    .card:active { transform: scale(0.98); }
    .card-title { font-family: 'Fraunces', serif; font-weight: 700; font-size: 17px; color: var(--texto); margin-bottom: 8px; }
    .card-info { display: flex; gap: 12px; font-size: 13px; color: var(--subtexto); margin: 6px 0; flex-wrap: wrap; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
    .badge {
      background: var(--verde-light);
      color: var(--verde);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.lleno { background: #FEE2E2; color: var(--rojo); }
    .badge.tuya { background: #FEF3C7; color: #92400E; }

    /* Countdown */
    .countdown-wrap { margin-top: 10px; }
    .countdown-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--subtexto); margin-bottom: 5px; }
    .countdown-bar-track { height: 6px; background: var(--crema-dark); border-radius: 3px; overflow: hidden; }
    .countdown-bar-fill { height: 100%; border-radius: 3px; transition: width 1s linear; }

    /* Botones */
    .btn {
      background: var(--verde);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      font-size: 15px;
      margin-top: 12px;
    }
    .btn-back {
      background: var(--gris-claro);
      color: var(--gris);
      border: none;
      padding: 14px 20px;
      border-radius: 60px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 8px;
    }
    .fab {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      right: 24px;
      background: var(--verde);
      color: white;
      border: none;
      height: 52px;
      padding: 0 22px;
      border-radius: 26px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(15,123,94,0.45);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 300;
    }

    /* Formularios */
    .form-input, .form-select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--borde);
      border-radius: 16px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    .form-label { font-size: 13px; font-weight: 600; color: var(--subtexto); margin-bottom: 7px; display: block; }

    /* Chat */
    .chat-section {
      background: white;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid var(--borde);
      margin-bottom: 12px;
    }
    .chat-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--texto);
      margin-bottom: 16px;
      border-bottom: 2px solid var(--verde-light);
      padding-bottom: 8px;
    }
    .qa-bubble {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 12px;
    }
    .qa-bubble-question {
      background: var(--azul-claro);
      border-left: 4px solid var(--azul);
    }
    .qa-bubble-answer {
      background: var(--verde-light);
      border-left: 4px solid var(--verde);
      margin-left: 20px;
      margin-bottom: 16px;
    }
    .qa-bubble-text { font-size: 14px; color: var(--texto); line-height: 1.5; }
    .qa-meta { font-size: 11px; color: var(--subtexto); margin-top: 6px; display: flex; justify-content: space-between; }
    .chat-input-area {
      background: var(--crema-dark);
      border-radius: 14px;
      padding: 12px;
      margin-top: 12px;
    }
    .chat-input-area textarea {
      width: 100%;
      border: 1.5px solid var(--borde);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      resize: vertical;
    }
    .chat-send-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .chat-waiting {
      background: #FEF3C7;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 13px;
      color: #92400E;
    }
    .char-counter {
      font-size: 11px;
      color: var(--subtexto);
      text-align: right;
      margin-top: 4px;
    }
    .char-counter.warning { color: #D97706; }
    .char-counter.danger { color: var(--rojo); }

    .detail-header {
      background: white;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid var(--borde);
    }
    .detail-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 900; color: var(--texto); margin-bottom: 10px; }
    .detail-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--subtexto); margin: 6px 0; flex-wrap: wrap; }
    .detail-countdown {
      background: white;
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid var(--borde);
      margin-bottom: 12px;
    }
    .map { height: 180px; border-radius: 16px; margin: 12px 0; overflow: hidden; border: 1px solid var(--borde); }
    .empty { text-align: center; padding: 40px 20px; color: var(--subtexto); }
    .join-card {
      background: #FFF8EC;
      border: 1px solid #F5D9A8;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .toast {
      position: fixed;
      bottom: calc(90px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: #1C1C1E;
      color: white;
      padding: 12px 20px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    #headerSpacer { flex-shrink: 0; }
    #homeListContainer { overflow-y: auto; flex: 1; padding-bottom: 80px; }
  </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="app">
  <div class="sticky-top" id="stickyTop">
    <div class="header" id="mainHeader">
      <div class="logo-wrap">
        <div class="logo">🧉 cebate uno</div>
        <div class="sub">Encuentros con mate en el parque</div>
      </div>
      <div class="header-actions">
        <button class="refresh-btn" onclick="recargar()">↻</button>
        <div id="authArea"></div>
      </div>
    </div>
    <div class="nav-bar" id="navBar">
      <button class="back-btn" onclick="goBack()">←</button>
      <span class="nav-title" id="navTitle"></span>
    </div>
  </div>

  <div id="headerSpacer"></div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-map-section">
      <div id="nearbyMap"></div>
      <div class="nearby-pill" id="nearbyPill" style="display:none;"></div>
      <button class="gps-btn" id="gpsBtn" onclick="pedirUbicacion()">📍</button>
      <div class="map-placeholder" id="mapPlaceholder">
        <span>🗺️</span><span>Activá el GPS para ver la mateada más cercana</span>
      </div>
    </div>
    <div id="homeListContainer">
      <div class="section-label" style="padding: 14px 20px 8px;"><span>Mateadas activas</span><span id="contadorMateadas"></span></div>
      <div id="homeContent"><div class="empty">Cargando mateadas...</div></div>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="screen-detail" class="screen"><div class="content" id="detailContent"></div></div>

  <!-- CREATE -->
  <div id="screen-create" class="screen">
    <div class="content">
      <div class="form-group"><label class="form-label">👤 Tu nombre</label><input class="form-input" id="nombreOrganizador" placeholder="Ej: Juan"></div>
      <div class="form-group"><label class="form-label">🎯 Tema</label>
        <select id="temaMateada" class="form-select">
          <option>🤝 Emprendedurismo</option><option selected>📖 Filosofía y vida cotidiana</option>
          <option>💻 Tecnología e IA</option><option>🎨 Arte y creatividad</option>
          <option>📚 Literatura</option><option>🎬 Cine y series</option>
          <option>🌱 Sustentabilidad</option><option>🧘 Bienestar y meditación</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">📍 Ubicación</label><input class="form-input" id="ubicacionMateada" placeholder="Ej: Parque Las Heras"></div>
      <div class="form-group"><label class="form-label">⏳ Duración</label>
        <div style="display: flex; gap: 8px;">
          <button class="duracion-btn" onclick="seleccionarDuracion(30)">30 min</button>
          <button class="duracion-btn selected" onclick="seleccionarDuracion(60)">1 hora</button>
          <button class="duracion-btn" onclick="seleccionarDuracion(120)">2 horas</button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">👥 Cupo máximo</label>
        <select id="cupoMateada" class="form-select"><option>4</option><option>6</option><option selected>8</option><option>10</option></select>
      </div>
      <button class="btn" onclick="crearMateada()">🌿 Publicar mateada</button>
      <button class="btn-back" onclick="irInicio()">Cancelar</button>
      <div style="height: 80px;"></div>
    </div>
  </div>

  <!-- JOIN -->
  <div id="screen-join" class="screen">
    <div class="content">
      <div id="joinInfo"></div>
      <div class="form-group">
        <label class="form-label">⏱️ ¿En cuántos minutos llegás?</label>
        <input type="range" id="tiempoLlegada" min="3" max="40" value="10">
        <span id="tiempoMostrar" style="font-weight:700; font-size:22px; color:var(--verde);">10 minutos</span>
      </div>
      <button class="btn" onclick="enviarSolicitud()">🧉 Quiero sumarme</button>
      <button class="btn-back" onclick="volverADetalle()">← Volver</button>
    </div>
  </div>

  <!-- SENT -->
  <div id="screen-sent" class="screen">
    <div class="sent-screen" style="text-align:center; padding:60px 20px;">
      <div class="sent-icon" style="font-size:72px;">🧉✨</div>
      <div class="sent-title" style="font-family:'Fraunces',serif; font-size:28px;">¡Listo!</div>
      <p>Le avisamos al organizador que llegás en <strong id="tiempoEnviado"></strong> minutos.</p>
      <button class="btn btn-secondary" onclick="irInicio()" style="margin-top:28px;">← Volver al inicio</button>
    </div>
  </div>

  <button class="fab" id="fabBtn" onclick="irACrear()"><span style="font-size:20px;">+</span> Agregar mateada</button>
</div>

<script>
// ============================================
// CONFIGURACIÓN
// ============================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylfR3cTEeaXN14MqzdTzYJH0otTcgDO0zJF-H-glS-hpoNHhZvFvkbIWaLsRBFiBGI/exec';

// ============================================
// AUTENTICACIÓN GOOGLE
// ============================================
let usuarioActual = null;

const sesionGuardada = localStorage.getItem('usuario_cebate_google');
if (sesionGuardada) {
    try { usuarioActual = JSON.parse(sesionGuardada); } catch(e) {}
}

function handleCredentialResponse(response) {
    const data = JSON.parse(atob(response.credential.split('.')[1]));
    usuarioActual = {
        sub: data.sub,
        nombre: data.name,
        email: data.email,
        avatar: data.picture
    };
    localStorage.setItem('usuario_cebate_google', JSON.stringify(usuarioActual));
    actualizarInterfazUsuario();
    mostrarToast(`✅ ¡Bienvenido/a, ${usuarioActual.nombre}!`);
    cargarMateadas();
}

function cerrarSesion() {
    usuarioActual = null;
    localStorage.removeItem('usuario_cebate_google');
    actualizarInterfazUsuario();
    mostrarToast('👋 Sesión cerrada');
    cargarMateadas();
}

function actualizarInterfazUsuario() {
    const area = document.getElementById('authArea');
    if (!area) return;
    if (!usuarioActual) {
        area.innerHTML = `<div id="googleButtonContainer"></div>`;
        if (window.google && google.accounts) {
            google.accounts.id.renderButton(
                document.getElementById("googleButtonContainer"),
                { theme: "outline", size: "small", text: "signin_with", shape: "pill" }
            );
        }
    } else {
        area.innerHTML = `<div class="user-avatar-placeholder" onclick="abrirUserSheet()">${usuarioActual.nombre[0].toUpperCase()}</div>`;
    }
}

function abrirUserSheet() {
    if (!usuarioActual) return;
    const confirmar = confirm(`Usuario: ${usuarioActual.nombre}\nEmail: ${usuarioActual.email}\n\n¿Cerrar sesión?`);
    if (confirmar) cerrarSesion();
}

// ============================================
// ESTADO GLOBAL
// ============================================
let mateadasActuales = [];
let mateadaSeleccionada = null;
let mapaDetalle = null;
let mapaNearby = null;
let nearbyMarkers = [];
let duracionSeleccionada = 60;
let countdownIntervals = {};
let userLat = null, userLng = null;

// ============================================
// FUNCIONES DE MAPA Y GEOLOCALIZACIÓN
// ============================================
function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function pedirUbicacion() {
    const btn = document.getElementById('gpsBtn');
    if (!navigator.geolocation) {
        mostrarToast('Geolocalización no soportada');
        return;
    }
    navigator.geolocation.getCurrentPosition(
        (p) => {
            userLat = p.coords.latitude;
            userLng = p.coords.longitude;
            btn.textContent = '✅';
            actualizarMapaCercano();
        },
        () => {
            userLat = -34.5842;
            userLng = -58.4073;
            actualizarMapaCercano();
        },
        { timeout: 8000 }
    );
}

function actualizarMapaCercano() {
    const ph = document.getElementById('mapPlaceholder');
    const pill = document.getElementById('nearbyPill');
    const vigentes = mateadasActuales.filter(m => !estaTerminada(m) && m.latitud && m.longitud);
    
    if (vigentes.length === 0) {
        if (ph) ph.style.display = 'flex';
        if (pill) pill.style.display = 'none';
        if (mapaNearby) {
            nearbyMarkers.forEach(mk => mapaNearby.removeLayer(mk));
            nearbyMarkers = [];
        }
        return;
    }
    
    if (ph) ph.style.display = 'none';
    
    let ordenadas = vigentes;
    if (userLat && userLng) {
        ordenadas = [...vigentes].sort((a, b) => 
            haversineKm(userLat, userLng, a.latitud, a.longitud) - 
            haversineKm(userLat, userLng, b.latitud, b.longitud)
        );
    }
    
    const cercana = ordenadas[0];
    
    if (!mapaNearby) {
        mapaNearby = L.map('nearbyMap', { zoomControl: false, attributionControl: false })
            .setView([-34.6, -64.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapaNearby);
    } else {
        nearbyMarkers.forEach(mk => mapaNearby.removeLayer(mk));
        nearbyMarkers = [];
    }
    
    const bounds = [];
    ordenadas.forEach((m, i) => {
        const esCercana = (i === 0);
        const icon = L.divIcon({
            html: `<div style="background:${esCercana ? '#0F7B5E' : 'rgba(15,123,94,0.55)'};color:white;width:${esCercana ? '38px' : '26px'};height:${esCercana ? '38px' : '26px'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${esCercana ? '18px' : '13px'};box-shadow:0 3px 10px rgba(15,123,94,0.45);border:${esCercana ? '3px' : '2px'} solid white;">🧉</div>`,
            iconSize: esCercana ? [38, 38] : [26, 26],
            iconAnchor: esCercana ? [19, 19] : [13, 13]
        });
        const mk = L.marker([parseFloat(m.latitud), parseFloat(m.longitud)], { icon }).addTo(mapaNearby);
        mk.on('click', () => verDetalle(m));
        nearbyMarkers.push(mk);
        bounds.push([parseFloat(m.latitud), parseFloat(m.longitud)]);
    });
    
    if (userLat && userLng) {
        const userIcon = L.divIcon({
            html: `<div style="background:#3B82F6;width:14px;height:14px;border-radius:7px;border:3px solid white;box-shadow:0 2px 6px rgba(59,130,246,0.6);"></div>`,
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        });
        const mkU = L.marker([userLat, userLng], { icon: userIcon }).addTo(mapaNearby);
        nearbyMarkers.push(mkU);
        bounds.push([userLat, userLng]);
    }
    
    if (bounds.length === 1) {
        mapaNearby.setView(bounds[0], 15);
    } else if (bounds.length > 1) {
        mapaNearby.fitBounds(bounds, { padding: [24, 24], maxZoom: 14 });
    }
    
    const dist = (userLat && userLng) ? ` · ${haversineKm(userLat, userLng, cercana.latitud, cercana.longitud).toFixed(1)} km` : '';
    pill.style.display = 'block';
    pill.textContent = `📍 ${cercana.titulo}${dist}`;
    
    setTimeout(() => mapaNearby?.invalidateSize(), 200);
}

// FUNCIONES DE COUNTDOWN
// ============================================
function duracionTexto(mins) {
    if (mins == 30) return '30 min';
    if (mins == 60) return '1 hora';
    if (mins == 120) return '2 horas';
    return mins + ' min';
}

function formatTiempoRestante(ms) {
    if (ms <= 0) return 'Terminada';
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}h ${m.toString().padStart(2, '0')}m`;
    if (m > 0) return `${m}m ${sec.toString().padStart(2, '0')}s`;
    return `${sec}s`;
}

function getInicioMs(m) {
    if (m.timestamp_unix) return parseInt(m.timestamp_unix) * 1000;
    if (m.timestamp_ms) return parseInt(m.timestamp_ms);
    if (m.fecha_hora) { const d = new Date(m.fecha_hora); if (!isNaN(d)) return d.getTime(); }
    if (m.fecha && m.hora) { const d = new Date(`${m.fecha}T${m.hora}:00`); if (!isNaN(d)) return d.getTime(); }
    return null;
}

function estaTerminada(m) {
    const inicio = getInicioMs(m);
    if (!inicio) return false;
    const duracionMs = (parseInt(m.duracion_minutos) || 60) * 60000;
    return Date.now() > (inicio + duracionMs);
}

function getMsRestante(m) {
    const inicio = getInicioMs(m);
    if (!inicio) return null;
    const duracionMs = (parseInt(m.duracion_minutos) || 60) * 60000;
    return (inicio + duracionMs) - Date.now();
}

function iniciarCountdown(m, fillId, labelId, onTerminada) {
    const durMs = (parseInt(m.duracion_minutos) || 60) * 60000;
    
    function tick() {
        const fill = document.getElementById(fillId);
        const label = document.getElementById(labelId);
        if (!fill || !label) {
            clearInterval(countdownIntervals[m.id]);
            return;
        }
        const ms = getMsRestante(m);
        if (ms === null) {
            fill.style.width = '100%';
            fill.style.background = '#0F7B5E';
            label.textContent = duracionTexto(parseInt(m.duracion_minutos) || 60);
            return;
        }
        const pct = Math.max(0, Math.min(1, ms / durMs));
        const color = pct > 0.5 ? '#0F7B5E' : (pct > 0.25 ? '#D97706' : '#DC2626');
        fill.style.width = (pct * 100) + '%';
        fill.style.background = color;
        if (ms <= 0) {
            fill.style.width = '0%';
            label.textContent = 'Terminada ✓';
            label.style.color = '#DC2626';
            clearInterval(countdownIntervals[m.id]);
            if (onTerminada) onTerminada(m.id);
        } else {
            label.textContent = formatTiempoRestante(ms);
            label.style.color = color;
        }
    }
    
    clearInterval(countdownIntervals[m.id]);
    tick();
    countdownIntervals[m.id] = setInterval(tick, 1000);
}

function mateadaTerminada(id) {
    const card = document.getElementById(`card-${id}`);
    if (card) {
        card.style.opacity = '0.5';
        setTimeout(() => {
            card.remove();
            const activas = mateadasActuales.filter(m => m.id != id && !estaTerminada(m));
            if (activas.length === 0) {
                document.getElementById('homeContent').innerHTML = '<div class="empty">✨ No hay mateadas activas<br>¡Sé el primero en crear una!</div>';
            }
            actualizarMapaCercano();
        }, 500);
    }
}

function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function formatFecha(iso) {
    if (!iso) return '';
    try {
        const date = new Date(iso);
        return date.toLocaleString('es-AR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch(e) { return iso; }
}

async function renderChat(mateada, container) {
    const esOrganizador = usuarioActual && (usuarioActual.sub === mateada.organizador_sub || usuarioActual.nombre === mateada.organizador);
    const chats = await obtenerChat(mateada.id);
    
    let html = '<div class="chat-section">';
    html += '<div class="chat-title">💬 Preguntas y respuestas</div>';
    
    if (!usuarioActual) {
        html += '<div class="chat-disabled-msg">🔐 Iniciá sesión con Google para hacer preguntas</div>';
    } else if (chats.length === 0) {
        html += '<div class="chat-disabled-msg">📭 Aún no hay preguntas. ¡Sé el primero en preguntar!</div>';
    } else {
        chats.forEach(chat => {
            html += `
                <div class="qa-bubble qa-bubble-question">
                    <div class="qa-bubble-text">
                        <strong>❓ ${escapeHtml(chat.usuario_nombre || 'Alguien')}:</strong><br>
                        ${escapeHtml(chat.pregunta)}
                    </div>
                    <div class="qa-meta">
                        <span>📅 ${formatFecha(chat.fecha)}</span>
                        ${chat.pregunta.length > 400 ? `<span>📏 ${chat.pregunta.length}/500</span>` : ''}
                    </div>
                </div>
            `;
            
            if (chat.respuesta) {
                html += `
                    <div class="qa-bubble qa-bubble-answer">
                        <div class="qa-bubble-text">
                            <strong>✅ ${escapeHtml(mateada.organizador)} (Organizador):</strong><br>
                            ${escapeHtml(chat.respuesta)}
                        </div>
                        <div class="qa-meta">
                            <span>📅 ${formatFecha(chat.fecha_respuesta)}</span>
                            ${chat.respuesta.length > 400 ? `<span>📏 ${chat.respuesta.length}/500</span>` : ''}
                        </div>
                    </div>
                `;
            } else if (esOrganizador && !chat.respuesta) {
                html += `
                    <div class="chat-input-area">
                        <textarea id="respuesta-${chat.id}" rows="3" placeholder="Escribí tu respuesta (máx. 500 caracteres)..." maxlength="500"></textarea>
                        <div class="char-counter" id="resp-counter-${chat.id}">0/500</div>
                        <button class="chat-send-btn" onclick="enviarRespuestaHandler('${chat.id}')">✏️ Responder</button>
                    </div>
                `;
            }
        });
        
        const miPregunta = chats.find(c => c.usuario_sub === usuarioActual?.sub);
        
        if (!esOrganizador && !miPregunta) {
            html += `
                <div class="chat-input-area">
                    <div style="margin-bottom: 8px; font-size: 13px; color: var(--subtexto);">
                        ℹ️ Podés hacer <strong>una sola pregunta</strong> (máx. 500 caracteres)
                    </div>
                    <textarea id="nueva-pregunta" rows="3" placeholder="Ej: ¿Hay que llevar algo? ¿Dónde nos encontramos?..." maxlength="500"></textarea>
                    <div class="char-counter" id="pregunta-counter">0/500</div>
                    <button class="chat-send-btn" onclick="enviarPreguntaHandler('${mateada.id}')">📨 Hacer pregunta</button>
                </div>
            `;
        } else if (!esOrganizador && miPregunta && !miPregunta.respuesta) {
            html += `<div class="chat-waiting">⏳ Ya realizaste una pregunta. Esperando respuesta del organizador...</div>`;
        } else if (!esOrganizador && miPregunta && miPregunta.respuesta) {
            html += `<div class="chat-disabled-msg">✅ Ya realizaste una pregunta y fue respondida.</div>`;
        }
    }
    
    html += '</div>';
    container.innerHTML = html;
    
    // Agregar contadores de caracteres
    setTimeout(() => {
        const nuevaPregunta = document.getElementById('nueva-pregunta');
        if (nuevaPregunta) {
            nuevaPregunta.addEventListener('input', function() {
                const counter = document.getElementById('pregunta-counter');
                if (counter) {
                    counter.textContent = `${this.value.length}/500`;
                    counter.className = `char-counter ${this.value.length > 450 ? (this.value.length > 490 ? 'danger' : 'warning') : ''}`;
                }
            });
        }
        
        chats.forEach(chat => {
            const textarea = document.getElementById(`respuesta-${chat.id}`);
            if (textarea) {
                textarea.addEventListener('input', function() {
                    const counter = document.getElementById(`resp-counter-${chat.id}`);
                    if (counter) {
                        counter.textContent = `${this.value.length}/500`;
                        counter.className = `char-counter ${this.value.length > 450 ? (this.value.length > 490 ? 'danger' : 'warning') : ''}`;
                    }
                });
            }
        });
    }, 100);
}

async function enviarPreguntaHandler(mateadaId) {
    const textarea = document.getElementById('nueva-pregunta');
    if (!textarea) return;
    const pregunta = textarea.value.trim();
    if (!pregunta) {
        mostrarToast('✏️ Escribí una pregunta');
        return;
    }
    if (pregunta.length > 500) {
        mostrarToast('La pregunta no puede superar los 500 caracteres');
        return;
    }
    
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    
    const result = await enviarPregunta(mateadaId, pregunta);
    if (result.success) {
        textarea.value = '';
        const counter = document.getElementById('pregunta-counter');
        if (counter) counter.textContent = '0/500';
        await verDetalle(mateadaSeleccionada);
    }
    
    btn.disabled = false;
    btn.textContent = '📨 Hacer pregunta';
}

async function enviarRespuestaHandler(chatId) {
    const textarea = document.getElementById(`respuesta-${chatId}`);
    if (!textarea) return;
    const respuesta = textarea.value.trim();
    if (!respuesta) {
        mostrarToast('✏️ Escribí una respuesta');
        return;
    }
    if (respuesta.length > 500) {
        mostrarToast('La respuesta no puede superar los 500 caracteres');
        return;
    }
    
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    
    const result = await enviarRespuesta(chatId, respuesta);
    if (result.success) {
        await verDetalle(mateadaSeleccionada);
    }
    
    btn.disabled = false;
    btn.textContent = '✏️ Responder';
}

    document.getElementById('joinInfo').innerHTML = `
        <div class="join-card">
            <div class="join-card-title">📍 ${escapeHtml(mateadaSeleccionada.ubicacion)}</div>
            <div style="font-size:14px;">${escapeHtml(mateadaSeleccionada.titulo)} · con ${escapeHtml(mateadaSeleccionada.organizador)}</div>
        </div>
    `;
    setNavTitle('Sumarme');
    mostrarScreen('screen-join');
}

function volverADetalle() {
    verDetalle(mateadaSeleccionada);
}

function irInicio() {
    mostrarScreen('screen-home');
    document.getElementById('navBar').classList.remove('visible');
    document.getElementById('mainHeader').style.display = '';
    cargarMateadas();
    setTimeout(() => {
        if (mapaNearby) {
            mapaNearby.invalidateSize();
            actualizarMapaCercano();
        }
    }, 500);
}

function irACrear() {
    if (!usuarioActual) {
        mostrarToast('Primero iniciá sesión con Google');
        return;
    }
    const campo = document.getElementById('nombreOrganizador');
    if (campo && !campo.value && usuarioActual) {
        campo.value = usuarioActual.nombre.split(' ')[0];
    }
    setNavTitle('Nueva mateada');
    mostrarScreen('screen-create');
}

function goBack() {
    if (document.getElementById('screen-join').classList.contains('active')) {
        verDetalle(mateadaSeleccionada);
    } else if (document.getElementById('screen-create').classList.contains('active')) {
        irInicio();
    } else {
        irInicio();
    }
}

function setNavTitle(title) {
    document.getElementById('navTitle').innerText = title;
}

function mostrarScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    const isHome = screenId === 'screen-home';
    document.getElementById('fabBtn').style.display = isHome ? 'flex' : 'none';
    document.getElementById('mainHeader').style.display = isHome ? '' : 'none';
    document.getElementById('navBar').classList.toggle('visible', !isHome);
}

function seleccionarDuracion(mins) {
    document.querySelectorAll('.duracion-btn').forEach(btn => btn.classList.remove('selected'));
    event.target.classList.add('selected');
    duracionSeleccionada = mins;
}

function recargar() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 600);
    cargarMateadas();
}

function mostrarToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function ajustarSpacer() {
    const height = document.getElementById('stickyTop').offsetHeight;
    document.getElementById('headerSpacer').style.height = height + 'px';
}

// Inicialización
window.onload = function() {
    if (window.google && google.accounts) {
        google.accounts.id.initialize({
            client_id: '171913559980-sagqbpfmm7r7m5rt3tolkaoej08ngn8j.apps.googleusercontent.com',
            callback: handleCredentialResponse,
            auto_select: false,
            cancel_on_tap_outside: true
        });
        google.accounts.id.renderButton(
            document.getElementById("googleButtonContainer") || {},
            { theme: "outline", size: "small", text: "signin_with", shape: "pill" }
        );
        google.accounts.id.prompt();
    }
    actualizarInterfazUsuario();
    ajustarSpacer();
    cargarMateadas();
    window.addEventListener('resize', ajustarSpacer);
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (p) => {
                userLat = p.coords.latitude;
                userLng = p.coords.longitude;
                document.getElementById('gpsBtn').textContent = '✅';
                actualizarMapaCercano();
            },
            () => {},
            { timeout: 5000 }
        );
    }
    
    const tiempoLlegada = document.getElementById('tiempoLlegada');
    if (tiempoLlegada) {
        tiempoLlegada.oninput = function() {
            document.getElementById('tiempoMostrar').innerText = this.value + ' minutos';
        };
    }
};

</script>
