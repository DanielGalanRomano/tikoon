<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DescuentosApp</title>
<style>
/* ... AQUÍ PEGA TU CSS ORIGINAL COMPLETO DESDE TU ARCHIVO ... */
/* Asegúrate de que las clases .offers-grid y .card estén presentes */
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="app">
  <div class="screens">
    <div class="screen active" id="screen-home">
      <div class="screen-body">
        <div class="offers-grid" id="offers-list">
           <p>Cargando datos...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 1. CONFIGURACIÓN
  const SUPABASE_URL = "https://rujxdrdgegwfbmmpvmid.supabase.co";
  const SUPABASE_KEY = "sb_publishable_oOKB7X2ntZhrwIziRquvTA_FsbuAERD";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 2. FUNCIÓN PARA RENDERIZAR LAS OFERTAS
  async function loadData() {
    const list = document.getElementById('offers-list');
    try {
      const { data, error } = await supabase.from('ofertas').select('*');
      if (error) throw error;

      if (data && data.length > 0) {
        list.innerHTML = data.map(item => `
          <div class="card">
            <div class="card-body">
              <h3 class="card-title">${item.nombre}</h3>
              <p class="p-now">$${item.precio}</p>
            </div>
          </div>
        `).join('');
      } else {
        list.innerHTML = "<p>No hay ofertas.</p>";
      }
    } catch (e) {
      console.error("Error:", e);
      list.innerHTML = "<p>Error de conexión.</p>";
    }
  }

  // 3. INICIO
  document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
