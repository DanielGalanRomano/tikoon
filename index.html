<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E8441A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DescuentosApp">
<title>DescuentosApp — Mejores Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ══ RESET & TOKENS ══ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #F5F2EC;
  --surface: #FFF;
  --s2: #F0EDE6;
  --s3: #E6E2D8;
  --text: #1C1B19;
  --text-m: #706E64;
  --primary: #E8441A;
  --primary-rgb: 232,68,26;
  --accent: #138052;
  --radius: 20px;
  --radius-sm: 12px;
  --font-title: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --shadow: 0 4px 20px rgba(0,0,0,0.03);
  --border: 1px solid rgba(0,0,0,0.06);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  padding-bottom: 90px;
}

h1, h2, h3, h4 { font-family: var(--font-title); font-weight: 700; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; border: none; background: none; cursor: pointer; }
input, select, textarea { font-family: inherit; border: none; outline: none; }

/* ── App Header ── */
header {
  background: var(--surface);
  padding: 20px 166px;
  border-bottom: var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
@media (max-width: 768px) {
  header { padding: 20px 16px; }
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.logo-area h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.logo-area span { color: var(--primary); }

.search-wrapper {
  background: var(--s2);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-wrapper input {
  background: transparent;
  width: 100%;
  font-size: 15px;
  color: var(--text);
}

.cats-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 16px 16px;
  scrollbar-width: none;
}
.cats-scroll::-webkit-scrollbar { display: none; }
.cat-pill {
  background: var(--surface);
  padding: 8px 16px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  border: var(--border);
  transition: all 0.2s ease;
}
.cat-pill.active {
  background: var(--text);
  color: var(--surface);
  border-color: var(--text);
}

/* ── Vistas ── */
.view { display: none; padding: 16px; max-width: 1200px; margin: 0 auto; }
.view.active { display: block; }

.grid-ofertas {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.card-prod {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px;
  border: var(--border);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  position: relative;
  cursor: pointer;
}
.card-img-box {
  width: 100%;
  aspect-ratio: 1;
  background: var(--s2);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 10px;
}
.card-img-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.badge-discount {
  position: absolute;
  top: 20px;
  left: 20px;
  background: var(--primary);
  color: var(--surface);
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-title);
}
.card-brand { font-size: 11px; text-transform: uppercase; color: var(--text-m); font-weight: 600; margin-bottom: 2px; }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 36px; }

.price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.curr-price { font-size: 18px; font-weight: 700; font-family: var(--font-title); color: var(--text); }
.old-price { font-size: 12px; text-decoration: line-through; color: var(--text-m); }

.store-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--s2);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  margin-top: auto;
}

/* ── Detalle / Comparador ── */
.detail-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  border: var(--border);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.detail-header { display: flex; gap: 16px; margin-bottom: 20px; }
.detail-img { width: 90px; height: 90px; background: var(--s2); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.detail-img img { width: 100%; height: 100%; object-fit: cover; }
.detail-main-info { flex: 1; }

.comp-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  background: var(--s2);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  border: 1px solid transparent;
}
.comp-item.best {
  background: #E8F5E9;
  border-color: var(--accent);
}
.comp-store { font-weight: 600; font-size: 14px; }
.comp-price-box { text-align: right; }
.comp-p { font-family: var(--font-title); font-weight: 700; font-size: 16px; }
.comp-shipping { font-size: 11px; color: var(--accent); font-weight: 500; }

.btn-go {
  background: var(--text);
  color: var(--surface);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 10px;
}
.best .btn-go { background: var(--accent); }

/* ── Panel Admin Mínimo ── */
.form-box {
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius);
  border: var(--border);
  margin-bottom: 16px;
}
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-m); margin-bottom: 4px; }
.form-control {
  width: 100%;
  background: var(--s2);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--text);
}
.btn-submit {
  width: 100%;
  background: var(--primary);
  color: var(--surface);
  padding: 12px;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-family: var(--font-title);
  margin-top: 8px;
}
.adm-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  padding: 12px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  border: var(--border);
}

/* ── Barra Navegación Inferior Estilo iOS ── */
nav.nav-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: var(--border);
  display: flex;
  justify-content: space-around;
  padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px));
  z-index: 200;
}
.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--text-m);
  font-size: 11px;
  font-weight: 500;
  width: 60px;
}
.nav-tab.active { color: var(--primary); font-weight: 600; }
.nav-tab svg { width: 22px; height: 22px; fill: currentColor; }

/* ── Toast & Realtime Indicator ── */
#toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1C1B19;
  color: #FFF;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
#toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

.realtime-bar {
  background: #138052;
  color: white;
  font-size: 11px;
  text-align: center;
  padding: 4px;
  font-weight: 600;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.pulse-dot {
  width: 6px;
  height: 6px;
  background: #FFF;
  border-radius: 50%;
  animation: pulse 1.6s infinite;
}
@keyframes pulse {
  0% { transform: scale(0.8); opacity: 0.5; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(0.8); opacity: 0.5; }
}
</style>
</head>
<body>

<div class="realtime-bar"><div class="pulse-dot"></div> SUPABASE REALTIME CONECTADO</div>

<header id="main-header">
  <div class="header-top">
    <div class="logo-area">
      <h1>Ahorra<span>.io</span></h1>
    </div>
  </div>
  <div class="search-wrapper">
    <svg width="18" height="1
